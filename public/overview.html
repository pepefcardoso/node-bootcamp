<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,300i,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" type="image/png" href="img/favicon.png" />

    <title>Roamora | Adventures in the Wild</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <a href="#" class="nav__el">Explorar Tours</a>
      </nav>

      <div class="header__logo">
        <img src="img/logo-white.png" alt="Roamora logo" />
      </div>

      <nav class="nav">
        <a href="#" class="nav__el btn btn--orange">Login</a>
      </nav>
    </header>

    <main class="main">
      <div class="card-container">
        <div class="card">
          <div class="card__header">
            <div class="card__picture">
              <div class="card__picture-overlay"></div>
              <img
                src="img/tour-1-cover.jpg"
                alt="Tour"
                class="card__picture-img"
              />
            </div>
            <h3 class="heading-tertirary">
              <span>The Chapada Hiker</span>
            </h3>
          </div>

          <div class="card__details">
            <h4 class="card__sub-heading">6 dias de aventura • Médio</h4>
            <p class="card__text">
              Caminhadas épicas pelas trilhas verdejantes da Chapada Diamantina.
            </p>
          </div>

          <div class="card__footer">
            <div class="card__price">
              <span class="card__price-value">$415</span>
              <span class="card__price-text">/ pessoa</span>
            </div>
            <a href="/tour.html" class="btn btn--orange">Detalhes</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer__logo">
        <img src="img/logo-white.png" alt="Roamora logo" />
      </div>
      <ul class="footer__nav">
        <li><a href="#">About us</a></li>
        <li><a href="#">Become a guide</a></li>
        <li><a href="#">Careers</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <p class="footer__copyright">
        &copy; by Pedro Cardoso. All rights reserved.
      </p>
    </footer>
  </body>
</html>
